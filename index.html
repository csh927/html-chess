<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Chess | Premium Experience</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="State-of-the-art chess game with professional logic and premium design.">
</head>
<body>
    <nav>
        <div class="nav-brand">GRANDMASTER CHESS</div>
        <div class="settings-group">
            <span style="font-weight: 600; font-size: 0.85rem; color: var(--text-dim);">PRESETS</span>
            <select id="time-control" class="time-select">
                <option value="60">1 min</option>
                <option value="180">3 min</option>
                <option value="600" selected>10 min</option>
                <option value="1800">30 min</option>
            </select>
            
            <div style="width: 1px; height: 24px; background: var(--glass-border); margin: 0 10px;"></div>
            
            <span style="font-weight: 600; font-size: 0.85rem; color: var(--text-dim);">CUSTOM (MIN)</span>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="number" id="custom-min" class="time-select" style="width: 80px;" min="1" max="180" value="10">
                <button id="apply-custom-time" class="btn btn-primary" style="padding: 8px 12px; border-radius: 10px; font-size: 0.8rem;">
                    <span class="material-symbols-rounded" style="font-size: 18px;">check</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="game-container">
        <aside class="panel left-panel">
            <section class="turn-section">
                <!-- Black Indicator (Top typically for professional look) -->
                <div id="black-turn" class="turn-indicator turn-black">
                    <div class="player-info">
                        <span class="material-symbols-rounded" style="color: #64748b">account_circle</span>
                        <span style="font-weight: 800; font-size: 1rem;">BLACK</span>
                    </div>
                    <div id="black-timer" class="timer">10:00</div>
                    <div class="progress-bar-container"><div id="black-progress" class="progress-bar"></div></div>
                </div>

                <!-- White Indicator (Bottom) -->
                <div id="white-turn" class="turn-indicator turn-white active">
                    <div class="player-info">
                        <span class="material-symbols-rounded" style="color: #f1f5f9">account_circle</span>
                        <span style="font-weight: 800; font-size: 1rem;">WHITE</span>
                    </div>
                    <div id="white-timer" class="timer">10:00</div>
                    <div class="progress-bar-container"><div id="white-progress" class="progress-bar"></div></div>
                </div>
            </section>

            <section class="info-group">
                <h3 style="font-size: 0.9rem; margin-bottom: 8px; color: var(--text-dim);">CAPTURED PIECES</h3>
                <div id="white-captured" class="captured-pieces" style="margin-bottom: 10px;"></div>
                <div id="black-captured" class="captured-pieces"></div>
            </section>

            <footer class="btn-group">
                <button id="undo-btn" class="btn btn-secondary">
                    <span class="material-symbols-rounded">undo</span>
                    UNDO
                </button>
                <button id="restart-btn" class="btn btn-primary">
                    <span class="material-symbols-rounded">refresh</span>
                    NEW GAME
                </button>
            </footer>
        </aside>

        <section class="board-wrapper">
            <div class="board-outer">
                <div id="chess-board" class="chess-board"></div>
            </div>
        </section>

        <aside class="right-panel">
            <header class="history-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="material-symbols-rounded" style="font-size: 20px;">format_list_numbered</span>
                    MOVE HISTORY
                </div>
                <span id="move-count" style="font-family: 'JetBrains Mono'; font-size: 0.8rem; font-weight: 500;">0 moves</span>
            </header>
            <div id="move-history" class="move-history">
                <!-- Rows dynamically added -->
            </div>
        </aside>
    </main>

    <div id="promotion-modal" class="modal-overlay">
        <div class="promotion-modal">
            <h2 style="font-weight: 800; letter-spacing: -1px;">PAWN PROMOTION</h2>
            <p style="color: var(--text-dim); margin-top: 5px;">Choose your piece</p>
            <div class="promotion-options">
                <div class="promo-option" data-type="q"></div>
                <div class="promo-option" data-type="r"></div>
                <div class="promo-option" data-type="b"></div>
                <div class="promo-option" data-type="n"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
